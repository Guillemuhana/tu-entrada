<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="tkGrad" x1="8" y1="14" x2="56" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3aa0ff"/>
      <stop offset="1" stop-color="#1b34d8"/>
    </linearGradient>
    <mask id="tkNotch">
      <rect x="6" y="16" width="52" height="32" rx="7" fill="#fff"/>
      <circle cx="6" cy="32" r="4.5" fill="#000"/>
      <circle cx="58" cy="32" r="4.5" fill="#000"/>
    </mask>
  </defs>

  <!-- ticket body -->
  <rect x="6" y="16" width="52" height="32" rx="7" fill="url(#tkGrad)" mask="url(#tkNotch)"/>

  <!-- perforation -->
  <line x1="43" y1="19" x2="43" y2="45" stroke="#eaf1ff" stroke-width="1.4"
        stroke-dasharray="1.5 2.4" stroke-linecap="round" opacity="0.9"/>

  <!-- QR panel -->
  <rect x="11.5" y="20.5" width="25" height="23" rx="3" fill="#ffffff"/>
  <g fill="#0f1b3d">
    <!-- finder: top-left -->
    <rect x="13.5" y="22.5" width="6" height="6" rx="1"/>
    <rect x="14.7" y="23.7" width="3.6" height="3.6" rx="0.5" fill="#fff"/>
    <rect x="15.6" y="24.6" width="1.8" height="1.8"/>
    <!-- finder: top-right -->
    <rect x="28.5" y="22.5" width="6" height="6" rx="1"/>
    <rect x="29.7" y="23.7" width="3.6" height="3.6" rx="0.5" fill="#fff"/>
    <rect x="30.6" y="24.6" width="1.8" height="1.8"/>
    <!-- finder: bottom-left -->
    <rect x="13.5" y="35.5" width="6" height="6" rx="1"/>
    <rect x="14.7" y="36.7" width="3.6" height="3.6" rx="0.5" fill="#fff"/>
    <rect x="15.6" y="37.6" width="1.8" height="1.8"/>
    <!-- data modules -->
    <rect x="22" y="23" width="1.8" height="1.8"/>
    <rect x="25" y="24.5" width="1.8" height="1.8"/>
    <rect x="22" y="26.5" width="1.8" height="1.8"/>
    <rect x="28.5" y="31" width="1.8" height="1.8"/>
    <rect x="31" y="31" width="1.8" height="1.8"/>
    <rect x="28.5" y="33.5" width="1.8" height="1.8"/>
    <rect x="33" y="33.5" width="1.8" height="1.8"/>
    <rect x="22" y="31" width="1.8" height="1.8"/>
    <rect x="24.5" y="33.5" width="1.8" height="1.8"/>
    <rect x="22" y="36" width="1.8" height="1.8"/>
    <rect x="24.5" y="38.5" width="1.8" height="1.8"/>
    <rect x="28.5" y="36" width="1.8" height="1.8"/>
    <rect x="31" y="38.5" width="1.8" height="1.8"/>
    <rect x="33" y="36" width="1.8" height="1.8"/>
  </g>
</svg>
